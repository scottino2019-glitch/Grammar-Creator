<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

         <style id="grammar-core-styles">
        :root {
            --paper-bg: #fdfaf6;
            --text-dark: #1a1a1a;
            --accent-gold: #c0a080;
            --sidebar-dark: #121212;
        }

        body { 
            background-color: var(--paper-bg); 
            color: var(--text-dark); 
            font-family: 'Crimson Pro', serif;
            -webkit-font-smoothing: antialiased;
        }

        .title-font { font-family: 'Cormorant Garamond', serif; }

        /* Struttura Capitolo Professionale */
        .ch-header { text-align: center; margin-bottom: 4rem; }
        .ch-label { 
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 1rem;
            display: block;
        }
        .ch-title { 
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            font-weight: 300;
            line-height: 1.1;
            color: #000;
        }
        .ch-separator {
            width: 80px;
            height: 2px;
            background: var(--accent-gold);
            margin: 2rem auto;
            opacity: 0.6;
        }

        /* Elementi del Libro di Grammatica */
        .grammar-content { font-size: 1.2rem; line-height: 1.8; text-align: justify; }
        
        /* Tabelle Grammaticali */
        .grammar-table-wrapper { margin: 2rem 0; overflow-x: auto; }
        .grammar-table {
            width: 100%;
            border-top: 2px solid var(--text-dark);
            border-bottom: 2px solid var(--text-dark);
            font-family: 'Crimson Pro', serif;
        }
        .grammar-table th {
            padding: 1rem;
            text-align: left;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            background: rgba(0,0,0,0.02);
            border-bottom: 1px solid #ddd;
        }
        .grammar-table td { padding: 1rem; border-bottom: 1px solid #eee; }
        .grammar-table tr:last-child td { border-bottom: none; }

        /* Box Nota/Eccezione */
        .note-box {
            margin: 2.5rem 0;
            padding: 2rem;
            background-color: #fff;
            border: 1px solid #e5e1da;
            border-left: 4px solid var(--accent-gold);
            box-shadow: 0 10px 30px -15px rgba(0,0,0,0.05);
            border-radius: 0 8px 8px 0;
        }
        .note-box-title {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent-gold);
            margin-bottom: 0.75rem;
            display: block;
        }

        /* Esempi */
        .example-block {
            margin: 1.5rem 0;
            padding-left: 1.5rem;
            border-left: 1px solid #ddd;
            font-style: italic;
            color: #444;
        }
        .example-item { margin-bottom: 0.5rem; position: relative; }
        .example-item::before { content: "•"; color: var(--accent-gold); position: absolute; left: -1rem; }

        /* 4. EVIDENZIATORI E MARCATORE TESTO */
        .m-oro { background-color: rgba(251, 191, 36, 0.3); padding: 0 4px; border-radius: 4px; font-weight: 600; }
        .m-rosso { background-color: rgba(239, 68, 68, 0.2); padding: 0 4px; border-radius: 4px; color: #b91c1c; font-weight: 600; }
        .m-verde { background-color: rgba(34, 197, 94, 0.2); padding: 0 4px; border-radius: 4px; color: #15803d; }
        .m-blu { background-color: rgba(59, 130, 246, 0.15); padding: 0 4px; border-radius: 4px; color: #1d4ed8; }
        .m-focus {
            background: linear-gradient(120deg, rgba(254, 240, 138, 0.4) 0%, rgba(254, 240, 138, 0.4) 100%);
            background-repeat: no-repeat; background-size: 100% 0.4em; background-position: 0 88%; font-weight: bold;
        }
        .errore-grammaticale { text-decoration: underline wavy #ef4444 2px; text-underline-offset: 5px; }
        .testo-blu { color: #1e40af;}
        .testo-rosso {color: #b91c1c;  }
        /* Classe per sottolineatura importante Rossa */
        .testo-importante-red {
            text-decoration: underline;
            text-decoration-color: #ff0000;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
        }

        /* Classe per sottolineatura importante Blu */
        .testo-importante-blue {
            text-decoration: underline;
            text-decoration-color: #0000ff;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
        }
/* Altri style */
         h1, .font-titolo, .font-header {
        font-family:  'Cinzel Decorative', serif;
        letter-spacing: 0.1em;
        line-height: 1.2;
    }
        /* notebook righe */
        .notebook-container {
    width: 100%;
    max-width: 500px;
    margin: 20px auto;
    perspective: 1000px;
  }

  .notebook-card {
    background-color: #fdfaf0;
    background-image: 
      linear-gradient(90deg, transparent 39px, #abced4 39px, #abced4 41px, transparent 41px),
      linear-gradient(#e1e1e1 0.1em, transparent 0.1em);
    background-size: 100% 1.5rem;
    padding: 2rem 1rem 1.5rem 3.5rem;
    border-radius: 5px;
    box-shadow: 5px 5px 15px rgba(0,0,0,0.1), 1px 1px 2px rgba(0,0,0,0.1);
    position: relative;
    border: 1px solid #d2c8b1;
    min-height: 300px;
    font-family: 'Special Elite', system-ui, serif;
    color: #3d3d3d;
  }

  .notebook-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 40px;
    height: 100%;
    width: 1px;
    background-color: #ffadad;
  }

  .vintage-header {
    font-family: 'Dancing Script', cursive;
    font-size: 1.8rem;
    color: #2c3e50;
    margin-bottom: 1.5rem;
    line-height: 1.5rem;
    border-bottom: 2px solid #2c3e50;
    display: inline-block;
  }

  .grammar-rule {
    font-size: 1rem;
    line-height: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .example-box {
    background-color: rgba(255, 255, 255, 0.4);
    border: 1px dashed #999;
    padding: 0.5rem 1rem;
    margin-top: 1rem;
    font-style: italic;
    transform: rotate(-1deg);
  }

  .example-label {
    font-weight: bold;
    color: #c0392b;
    text-transform: uppercase;
    font-size: 0.8rem;
    display: block;
    margin-bottom: 0.2rem;
  }

  .ink-stain {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    background: radial-gradient(circle, rgba(0,0,0,0.15) 0%, transparent 70%);
    border-radius: 50%;
    filter: blur(2px);
  }
         /* --- STILE POST-IT --- */
       .post-it {
  width: 250px;
  min-height: 250px;
  background-color: #fdfd96; /* Colore giallo tipico dei post-it */
  padding: 20px 25px;
  position: relative;
  font-family: 'Reenie Beanie', cursive;
  font-weight: 400;
  font-style: normal;
  font-size: 1.5rem;
  color: #111;
  /* Leggera rotazione statica e ombra di base */
  transform: rotate(-3deg);
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

/* Effetto tridimensionale dell'angolo in basso a destra */
.post-it::after {
  content: "";
  position: absolute;
  z-index: -1;
  bottom: 15px;
  right: 10px;
  width: 50%;
  height: 20%;
  /* Ombra più marcata e ruotata per simulare il distacco dalla superficie */
  box-shadow: 0 15px 12px rgba(0, 0, 0, 0.4);
  transform: rotate(5deg);
}

/* Stile per i contenuti interni */
.post-it h2 {
  margin-top: 0;
  font-size: 2.0rem;
  border-bottom: 2px solid rgba(0, 0, 0, 0.1);
  padding-bottom: 5px;
}

.post-it ul {
  padding-left: 20px;
  margin: 15px 0 0 0;
}

.post-it li {
  margin-bottom: 8px;
}

        /* Stile del box multiplo */
  .chinese-examples-box {
        max-width: 500px; /* Mantiene il     box compatto */
        margin: 2.5rem 0;
        padding: 2rem;
        background-color: #fff;
        border: 1px solid #e5e1da;
        border-left: 4px solid var(--accent-gold);
        box-shadow: 0 10px 30px -15px rgba(0,0,0,0.05);

}

.box-header {
  font-size: 0.85rem;
  font-weight: 600;
  color: #6b7280;
  text-transform: uppercase;

  margin-bottom: 12px;
  border-bottom: 2px solid #f3f4f6;
  padding-bottom: 8px;
}

/* Lista degli esempi */
.example-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 16px; /* Spazio tra i vari esempi */
}

.example-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* Stile per i caratteri cinesi e il Pinyin */
.chinese-text {
  /* Font specifici per una lettura chiara dei caratteri cinesi */
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  font-size: 1.3rem; /* Grandezza leggibile ma non enorme */
  color: #1f2937;
  line-height: 2; /* Spazio extra necessario per accogliere il Pinyin */
}

/* Regole per il tag ruby */
ruby {
  ruby-align: center;
  margin-right: 2px; /* Leggero respiro tra le parole/caratteri */
}

rt {
  font-size: 0.55em; /* Dimensione del pinyin rispetto al carattere */
  color: #6b7280;
  font-family: 'Segoe UI', Roboto, sans-serif;
  font-weight: normal;
  transform: translateY(-2px); /* Alza leggermente il pinyin */
}

/* Stile della traduzione italiana */
.italian-translation {
  font-size: 0.95rem;
  color: #4b5563;
  font-style: italic;
  padding-left: 4px;
  border-left: 2px solid #3b82f6; /* Una riga azzurra per evidenziare la traduzione */
}
/* Contenitore per l'esempio singolo */
.chinese-example-single {
      max-width: 500px;
      margin: 2.5rem 0;
      padding: 2rem;
      background-color: #fff;
      border: 1px solid #e5e1da;
      border-left: 4px solid var(--accent-gold);
      box-shadow: 0 10px 30px -15px rgba(0,0,0,0.05);
      border-radius: 0 8px 8px 0;
      display: flex;
     flex-direction: column;
     gap: 10px; /* Distanza tra la frase in cinese e la traduzione */
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
}
/* Box grammatica più esempi */
    .vintage-container {
    max-width: 900px;

.grammar-row {

        /* Navigazione */
        .sidebar-item {
            padding: 1rem 1.5rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: all 0.3s;
        }
        .sidebar-item.active { background: rgba(255,255,255,0.05); border-left: 3px solid var(--accent-gold); }
        .sidebar-item:hover:not(.active) { background: rgba(255,255,255,0.02); }

        .nav-btn {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;

        .nav-btn:hover:not(:disabled) { background: #000; color: #fff; }

        /* Animazioni */
        @keyframes pageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

</head>
<body class="h-full flex overflow-hidden">

<div id="app" class="flex h-full w-full">
    
    <!-- Sidebar Indice -->
    <aside id="sidebar" class="w-80 h-full bg-[#121212] text-[#d1d1d1] flex-shrink-0 z-30 flex flex-col transition-transform duration-300 lg:translate-x-0 -translate-x-full fixed lg:relative shadow-2xl">
        <div class="p-10 border-b border-white/5">
            <h1 id="side-book-title" class="title-font text-2xl font-bold text-white tracking-tight">Manuale</h1>
            <div id="side-book-author" class="text-[10px] uppercase tracking-[0.3em] mt-3 text-[#c0a080] font-bold">Grammatica Digitale</div>
        </div>
        <nav class="flex-1 overflow-y-auto py-6" id="toc-container"></nav>
        <div class="p-6 border-t border-white/5">
            <button onclick="toggleEditor()" class="w-full py-3 bg-white/5 hover:bg-white/10 rounded text-[10px] font-bold uppercase tracking-widest transition-all">⚙ Modalità Editor</button>
        </div>
    </aside>

    <!-- Overlay Mobile -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-20 lg:hidden hidden"></div>

    <!-- Area di Lettura -->
    <main class="flex-1 h-full overflow-y-auto flex flex-col items-center">
        <div class="max-w-3xl w-full px-8 sm:px-16 py-20 lg:py-32 flex-1">
            <article id="book-content" class="animate-page">
                <header class="ch-header">
                    <span id="display-ch-label" class="ch-label">Sezione 1</span>
                    <h2 id="display-ch-title" class="ch-title">Titolo</h2>
                    <div class="ch-separator"></div>
                </header>

                <div id="display-ch-body" class="grammar-content">
                    <!-- Contenuto dinamico -->
                </div>
            </article>

            <footer class="mt-32 pt-10 border-t border-black/5 flex justify-between items-center">
                <button onclick="changeChapter(-1)" id="btn-prev" class="nav-btn">Precedente</button>
                <span id="nav-counter" class="text-[10px] font-bold uppercase tracking-widest opacity-30">1 / 1</span>
                <button onclick="changeChapter(1)" id="btn-next" class="nav-btn">Successivo</button>
            </footer>
        </div>
    </main>

    <!-- Editor UI Panel -->
    <div id="editor-panel" class="fixed inset-y-0 right-0 w-[500px] bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-500 flex flex-col text-slate-800">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <h2 class="font-black text-xs uppercase tracking-widest">Pannello di Scrittura</h2>
            <button onclick="toggleEditor()" class="text-slate-400 hover:text-black">✕</button>
        </div>

        <div class="flex-1 overflow-y-auto p-8 space-y-8">
            <!-- Info Globali -->
            <section class="space-y-4">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400">Titolo del Libro</label>
                <input type="text" id="edit-book-title" oninput="syncGlobal()" class="w-full p-3 border rounded-lg text-sm focus:ring-2 focus:ring-slate-200 outline-none">
            </section>

            <!-- Capitolo Corrente -->
            <section class="p-6 bg-slate-50 rounded-xl space-y-4 border border-slate-100">
                <h3 class="text-[10px] font-black uppercase text-blue-500 tracking-widest mb-4">Editing Capitolo</h3>
                
                <input type="text" id="edit-ch-label" oninput="syncChapter()" class="w-full p-3 border rounded text-sm mb-2" placeholder="Etichetta (es: Capitolo I)">
                <input type="text" id="edit-ch-title" oninput="syncChapter()" class="w-full p-3 border rounded text-sm" placeholder="Titolo della Lezione">
                
                <div class="pt-4">
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Corpo Lezione (HTML supportato)</label>
                    <textarea id="edit-ch-body" oninput="syncChapter()" class="w-full h-96 p-4 border rounded font-mono text-xs leading-relaxed" placeholder="Scrivi qui..."></textarea>
                </div>
            </section>

            <section class="bg-amber-50 p-4 rounded-lg border border-amber-100">
                <h4 class="text-[9px] font-black uppercase text-amber-600 mb-2 tracking-widest">Snippet Rapidi</h4>
                <div class="grid grid-cols-1 gap-2 text-[10px] font-mono text-amber-800">
                    <div class="bg-white p-2 rounded cursor-pointer" onclick="insertSnippet('table')">Tabella Grammaticale</div>
                    <div class="bg-white p-2 rounded cursor-pointer" onclick="insertSnippet('note')">Box Nota Bene</div>
                    <div class="bg-white p-2 rounded cursor-pointer" onclick="insertSnippet('example')">Lista Esempi</div>
<div class="bg-white p-2 rounded cursor-pointer" onclick="insertSnippet('structure')">Struttura</div>
<div class="bg-white p-2 rounded cursor-pointer" onclick="insertSnippet('note2')">Box giallo</div>
<div class="bg-white p-2 rounded cursor-pointer" onclick="insertSnippet('flashcard')">Flashcard</div>
<div class="bg-white p-2 rounded cursor-pointer" onclick="insertSnippet('box')">Box Multiiplo</div>
<div class="bg-white p-2 rounded cursor-pointer" onclick="insertSnippet('box2')">box singolo</div>
<div class="bg-white p-2 rounded cursor-pointer" onclick="insertSnippet('focus')">errori e focus</div>
<div class="bg-white p-2 rounded cursor-pointer" onclick="insertSnippet('main')">main</div>
<div class="bg-white p-2 rounded cursor-pointer" onclick="insertSnippet('subtitle')">Subtitle</div>
<div class="bg-white p-2 rounded cursor-pointer" onclick="insertSnippet('postit')">Postit</div> 
<div class="bg-white p-2 rounded cursor-pointer" onclick="insertSnippet('grammar')">Grammatica + esempi</div>
                </div>
            </section>
        </div>

        <div class="p-8 bg-slate-50 border-t space-y-3">
            <button onclick="addChapter()" class="w-full py-3 bg-slate-900 text-white rounded-lg text-xs font-bold tracking-widest hover:bg-slate-800">NUOVO CAPITOLO</button>
            <button onclick="exportGrammar()" class="w-full py-4 bg-[#c0a080] text-white rounded-lg text-xs font-bold tracking-widest shadow-xl hover:opacity-90">ESPORTA MANUALE FINALE (.HTML)</button>
            <button onclick="resetAll()" class="w-full py-2 text-red-400 text-[10px] font-bold uppercase tracking-widest mt-4">Resetta Progetto</button>
        </div>
    </div>

    <!-- Mobile Button -->
    <button onclick="toggleSidebar()" class="lg:hidden fixed top-6 left-6 bg-white/80 p-3 rounded-full shadow-lg z-40">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
</div>
